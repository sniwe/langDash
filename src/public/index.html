<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>audioTest</title>
  <link rel="stylesheet" href="../frontend/style.css" />
</head>
<body>
  <main class="app">
    <input id="audio-file" type="file" accept="audio/*" hidden />
    <section id="login-view" class="login-view">
      <h2 class="login-title">Sign In</h2>
      <p class="login-copy">Enter username and password to continue.</p>
      <form id="login-form" class="login-form" novalidate>
        <label class="login-label" for="login-username">Username</label>
        <input id="login-username" class="login-input" type="text" autocomplete="username" required />
        <label class="login-label" for="login-password">Password</label>
        <input id="login-password" class="login-input" type="password" autocomplete="current-password" required />
        <button id="login-button" class="login-button" type="submit">Log In</button>
      </form>
      <p id="login-status" class="login-status"></p>
    </section>

    <section id="library-view" class="library-view">
      <div class="library-head-row">
        <div class="library-head-left">
          <button id="modules-button" class="logout-button hidden" type="button" aria-label="Back to modules">Back</button>
          <button id="guide-button-list" class="guide-button hidden" type="button" aria-label="Start guide mode">Guide</button>
          <button id="logout-button" class="logout-button" type="button" aria-label="Log out" title="Log out">Logout</button>
        </div>
        <button id="upload-button" class="upload-button hidden" type="button" aria-label="Upload audio" title="Upload audio">Upload</button>
      </div>
      <section id="module-dashboard" class="module-dashboard">
        <p class="module-dashboard-kicker">Post-login modules</p>
        <p id="module-status" class="save-status"></p>
        <div id="module-grid" class="module-grid"></div>
      </section>
      <section id="ingest-panel" class="ingest-panel hidden">
        <p id="save-status" class="save-status"></p>
        <section class="library" aria-live="polite">
          <div id="audio-cards" class="audio-cards"></div>
          <p id="empty-state" class="empty-state">No persisted audio files yet.</p>
        </section>
      </section>
    </section>

    <section id="player-view" class="player-view hidden">
      <div class="player-head">
        <button id="back-button" class="back-button" type="button" aria-label="Back to audio list">Back</button>
        <button id="guide-button-player" class="guide-button" type="button" aria-label="Start guide mode">Guide</button>
      </div>
      <p id="file-name" class="file-name"></p>
      <div id="player-loading" class="player-loading hidden" aria-live="polite">
        <span class="player-loading-title">Loading audEp...</span>
        <div class="card-progress">
          <span class="card-progress-bar is-indeterminate"></span>
          <span class="card-progress-label">Restoring checkpoints and subSegs</span>
        </div>
      </div>
      <section class="player" aria-live="polite" tabindex="0" aria-label="Audio episode player">
        <audio id="audio" preload="metadata"></audio>
        <div class="progress-wrap" role="group" aria-label="Playback progress">
          <div id="progress-track-main" class="progress-track">
            <input id="progress" type="range" min="0" max="1000" value="0" disabled tabindex="-1" />
            <div id="selected-span-overlay" class="selected-span-overlay" aria-hidden="true"></div>
            <div id="subseg-overlays" class="subseg-overlays" aria-hidden="true"></div>
            <div id="checkpoint-markers" class="checkpoint-markers" aria-hidden="true"></div>
            <div id="checkpoint-magnifier" class="checkpoint-magnifier hidden" aria-hidden="true">
              <span id="checkpoint-magnifier-line" class="checkpoint-magnifier-line"></span>
              <span id="checkpoint-magnifier-time" class="checkpoint-magnifier-time">00:00</span>
            </div>
            <div id="playhead" class="playhead" aria-hidden="true">
              <span class="playhead-arrow"></span>
              <span id="playhead-time" class="playhead-time">00:00</span>
            </div>
          </div>
        </div>
        <div
          id="audseg-note-editor"
          class="audseg-note-editor hidden"
          contenteditable="true"
          role="textbox"
          aria-multiline="true"
          spellcheck="true"
          tabindex="0"
        ></div>
        <div id="target-progress-wrap" class="progress-wrap hidden" role="group" aria-label="Target audSeg progress">
          <div class="progress-track target-progress-track">
            <input id="target-progress" type="range" min="0" max="1000" value="0" disabled tabindex="-1" />
            <div id="target-span-overlay" class="selected-span-overlay target-span-overlay" aria-hidden="true"></div>
            <div id="target-subseg-active-fill" class="target-subseg-active-fill" aria-hidden="true"></div>
            <div id="target-checkpoint-markers" class="checkpoint-markers target-checkpoint-markers" aria-hidden="true"></div>
            <div id="target-playhead" class="playhead target-playhead" aria-hidden="true">
              <span class="playhead-arrow"></span>
              <span id="target-playhead-time" class="playhead-time">00:00</span>
            </div>
          </div>
        </div>
        <div id="subseg-value-panel" class="subseg-value-panel hidden" aria-live="polite">
          <div
            id="subseg-value-input"
            class="audseg-note-editor subseg-value-draft-card hidden"
            contenteditable="true"
            role="textbox"
            aria-multiline="true"
            spellcheck="true"
            tabindex="0"
          ></div>
          <div id="subseg-value-list" class="subseg-value-list"></div>
        </div>
        <div id="delete-confirm-dialog" class="delete-confirm-dialog hidden" role="dialog" aria-modal="true" aria-labelledby="delete-confirm-text">
          <p id="delete-confirm-text" class="delete-confirm-text">Delete this target?</p>
          <div class="delete-confirm-actions">
            <button id="delete-confirm-cancel" class="delete-confirm-cancel" type="button">Cancel</button>
            <button id="delete-confirm-delete" class="delete-confirm-delete" type="button">Delete</button>
          </div>
        </div>
      </section>
    </section>
    <div id="page-toolbar" class="page-toolbar" aria-hidden="true"></div>
    <div id="guide-overlay" class="guide-overlay hidden" aria-live="polite">
      <div id="guide-spotlight" class="guide-spotlight" aria-hidden="true"></div>
      <div id="guide-tooltip" class="guide-tooltip" role="dialog" aria-modal="false" aria-label="Guide mode">
        <button id="guide-close-button" class="guide-close-button" type="button" aria-label="Close guide mode">Close</button>
        <p id="guide-step-title" class="guide-step-title"></p>
        <p id="guide-step-text" class="guide-step-text"></p>
        <div id="guide-language-picker" class="guide-language-picker hidden">
          <button id="guide-lang-en" class="guide-lang-button" type="button">English</button>
          <button id="guide-lang-zh" class="guide-lang-button" type="button">中文</button>
        </div>
        <div class="guide-actions">
          <button id="guide-prev-button" class="guide-nav-button" type="button">Prev</button>
          <span id="guide-step-counter" class="guide-step-counter"></span>
          <button id="guide-next-button" class="guide-nav-button" type="button">Next</button>
        </div>
      </div>
    </div>
  </main>

  <script src="../frontend/modules/auth-storage.js"></script>
  <script src="../frontend/modules/format-utils.js"></script>
  <script src="../frontend/modules/session-runtime.js"></script>
  <script src="../frontend/modules/app-runtime.js"></script>
  <script src="../frontend/app.js"></script>
</body>
</html>
